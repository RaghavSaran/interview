<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Word by Word Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #f0f0f0;
      user-select: none;
      transition: background 1.2s ease;
    }

    /* ── UPDATE BADGE top-right ── */
    #update-badge {
      position: fixed;
      top: 1.2rem; right: 1.2rem;
      background: #16a34a;
      color: #fff;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      padding: 0.45rem 1.1rem;
      border-radius: 99px;
      cursor: pointer;
      display: none;
      z-index: 999;
      border: none;
      transition: background 0.2s;
    }
    #update-badge:hover { background: #15803d; }

    /* ── PARAGRAPH INDEX top-left ── */
    #para-index {
      position: fixed;
      top: 1rem; left: 1rem;
      display: none;
      flex-direction: column;
      gap: 6px;
      z-index: 100;
    }
    .pi-para { display: flex; flex-direction: column; gap: 3px; }
    .pi-line {
      width: 26px; height: 4px;
      border-radius: 3px;
      background: #2a2a2a;
      transition: background 0.35s ease;
    }
    .pi-line.done   { background: #ef4444; }
    .pi-line.active { background: #facc15; box-shadow: 0 0 4px #facc1566; }
    .pi-line.ahead  { background: #22c55e; }

    /* ── SHELL ── */
    #app {
      width: 100%;
      max-width: 700px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* ── START SCREEN ── */
    #start-screen { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; text-align: center; }
    #start-screen h1 { font-size: 2rem; font-weight: 300; letter-spacing: 0.08em; color: #e0e0e0; }
    #start-screen p  { font-size: 1rem; color: #888; max-width: 360px; line-height: 1.6; }

    /* ── READER SCREEN ── */
    #reader-screen { display: none; width: 100%; flex-direction: column; align-items: center; gap: 1.5rem; }

    #progress-wrap { width: 100%; height: 3px; background: #2a2a2a; border-radius: 99px; overflow: hidden; }
    #progress-bar  { height: 100%; background: linear-gradient(90deg,#6366f1,#a78bfa); border-radius: 99px; transition: width 0.3s ease; width: 0%; }

    /* Note area above divider */
    #note-area {
      width: 100%;
      min-height: 2rem;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0 0.5rem 0.5rem;
    }
    #note-text {
      color: #4a4a4a;
      font-style: italic;
      text-align: center;
      line-height: 1.45;
      max-width: 100%;
      word-break: break-word;
      font-size: clamp(0.6rem, 1.6vw, 0.85rem);
      transition: opacity 0.3s;
    }

    /* Divider */
    #divider { width: 100%; height: 1px; background: #222; }

    /* Word box */
    #word-box {
      width: 100%;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 2rem 2.5rem;
      overflow: hidden;
      transition: background 1s ease, border-color 1s ease;
    }

    .chunk-row {
      text-align: center;
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1.4;
      transition: color 0.18s, font-size 0.18s;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .chunk-row.active { font-size: clamp(1.8rem, 4.5vw, 2.8rem); color: #f0f0f0; }
    .chunk-row.near   { font-size: clamp(1rem,   2.5vw, 1.5rem);  color: #383838; }
    .chunk-row.far    { font-size: clamp(0.8rem,  1.8vw, 1.1rem); color: #262626; }
    .chunk-row.wait-active {
      font-size: clamp(1.8rem, 4.5vw, 2.8rem);
      color: #facc15;
      letter-spacing: 0.18em;
      font-weight: 400;
    }
    .chunk-row.wait-near {
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      color: #4a3e10;
      letter-spacing: 0.1em;
    }

    #counter { font-size: 0.82rem; color: #444; letter-spacing: 0.06em; }

    #nav-hint { display: flex; gap: 1.5rem; align-items: center; }
    .hint-key  { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: #555; }
    .key-badge {
      background: #222; border: 1px solid #383838; border-bottom: 3px solid #383838;
      border-radius: 6px; padding: 3px 10px; font-size: 0.75rem; color: #888; font-family: monospace;
    }

    #restart-btn {
      display: none; padding: 0.7rem 2.2rem; border-radius: 99px;
      border: 1px solid #6366f1; background: transparent; color: #a78bfa;
      font-size: 0.95rem; letter-spacing: 0.06em; cursor: pointer; transition: background 0.2s;
    }
    #restart-btn:hover { background: #6366f120; color: #c4b5fd; }

    #status { font-size: 0.9rem; color: #555; text-align: center; }
    #status.error { color: #f87171; }

    .btn-primary {
      padding: 0.85rem 3rem; border-radius: 99px; border: none;
      background: #2a2a2a; color: #555; font-size: 1.1rem;
      letter-spacing: 0.06em; cursor: not-allowed;
      transition: background 0.35s, color 0.35s, transform 0.1s;
    }
    .btn-primary.ready { background: #16a34a; color: #fff; cursor: pointer; }
    .btn-primary.ready:hover { background: #15803d; }
    .btn-primary.ready:active { transform: scale(0.97); }

    #mobile-nav { display: none; gap: 1.5rem; }
    .arrow-btn {
      width: 56px; height: 56px; border-radius: 50%;
      border: 1px solid #333; background: #1a1a1a; color: #aaa;
      font-size: 1.4rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .arrow-btn:hover { background: #252525; color: #fff; }
    .arrow-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    @media (hover: none) and (pointer: coarse) {
      #mobile-nav { display: flex; }
      #nav-hint   { display: none; }
    }
  </style>
</head>
<body>

<button id="update-badge" onclick="applyUpdate()">&#9650; New content — Update?</button>
<div id="para-index"></div>

<div id="app">

  <div id="start-screen">
    <h1>Word Reader</h1>
    <p>Three words at a time. Use arrow keys to navigate.</p>
    <button class="btn-primary" id="start-btn" onclick="startReading()" disabled>Checking…</button>
    <div id="status"></div>
  </div>

  <div id="reader-screen">
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <div id="note-area"><div id="note-text"></div></div>
    <div id="divider"></div>
    <div id="word-box"></div>
    <div id="counter"></div>
    <div id="nav-hint">
      <div class="hint-key"><span class="key-badge">←</span> back</div>
      <div class="hint-key"><span class="key-badge">→</span> forward</div>
    </div>
    <div id="mobile-nav">
      <button class="arrow-btn" id="prev-btn" onclick="go(-1)" disabled>&#8592;</button>
      <button class="arrow-btn" id="next-btn" onclick="go(1)">&#8594;</button>
    </div>
    <button id="restart-btn" onclick="restart()">Start over</button>
  </div>

</div>

<script>
// ════════════════════════════════════
//  CONFIG
// ════════════════════════════════════
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJ2QtTJARx-j7RaGTukC9ibdpmwCRc7UPM7Hkg7c4z-54g6WnNRtMdltaco3Uf_3VujQ/exec";
const CHUNK        = 3;
const POLL_MS      = 5000;
const SAVE_DELAY   = 10000;
const WAIT_TEXT    = "<<<WAIT>>>";

// ════════════════════════════════════
//  STATE
// ════════════════════════════════════
let chunks        = [];
let idx           = 0;
let pendingChunks = null;
let lastRawClean  = "";
let saveTimer     = null;

// ════════════════════════════════════
//  BUILD ROWS (5 sliding rows)
// ════════════════════════════════════
const wordBox  = document.getElementById("word-box");
const rowKeys  = ["far","near","active","near","far"];
const rows     = rowKeys.map(cls => {
  const d = document.createElement("div");
  d.className = "chunk-row " + cls;
  wordBox.appendChild(d);
  return d;
});

// ════════════════════════════════════
//  PARSE DOC  (Changes 3, 6, 7)
// ════════════════════════════════════
function parseDoc(raw) {
  // Strip position marker ~ from display
  const clean = raw.replace(/~/g, "");
  // Split into paragraphs
  const paras = clean.split(/\n+/).map(p => p.trim()).filter(p => p.length > 0);
  const result = [];

  paras.forEach((paraText, pIdx) => {
    // Change 6: split at xxxx
    let karaokeText = paraText;
    let noteText    = "";
    const noteMatch = paraText.match(/xxxx/i);
    if (noteMatch) {
      const pos   = paraText.indexOf(noteMatch[0]);
      karaokeText = paraText.slice(0, pos).trim();
      noteText    = paraText.slice(pos + 4).trim();
    }
    if (!karaokeText.length) return;

    const words = karaokeText.split(/\s+/).filter(w => w.length > 0);
    const batches = [];
    for (let i = 0; i < words.length; i += CHUNK) {
      batches.push(words.slice(i, i + CHUNK).join(" "));
    }

    batches.forEach((text, lIdx) => {
      result.push({
        text,
        note:             noteText,
        isWait:           false,
        paraIdx:          pIdx,
        lineIdx:          lIdx,
        totalLines:       batches.length
      });
    });

    // Change 3: inject WAIT between paragraphs
    if (pIdx < paras.length - 1) {
      result.push({ text: WAIT_TEXT, note: "", isWait: true, paraIdx: pIdx, lineIdx: -1, totalLines: 0 });
    }
  });

  return result;
}

// ════════════════════════════════════
//  SAVED POSITION  (Change 5)
//  ~ marker in doc tells us where user left off
// ════════════════════════════════════
function findSavedIdx(raw, parsedChunks) {
  const tildePos = raw.indexOf("~");
  if (tildePos === -1) return 0;
  // Count non-wait batches before tilde's word position
  const textBefore = raw.slice(0, tildePos).replace(/xxxx[\s\S]*?(?=\n|$)/gi,"");
  const wordsBefore = textBefore.split(/\s+/).filter(w => w.length > 0).length;
  const targetBatch = Math.floor(wordsBefore / CHUNK);
  let counted = 0;
  for (let i = 0; i < parsedChunks.length; i++) {
    if (parsedChunks[i].isWait) continue;
    if (counted >= targetBatch) return i;
    counted++;
  }
  return 0;
}

function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, SAVE_DELAY);
}

async function doSave() {
  // Count how many non-wait batches we've gone through
  let batchNum = 0;
  for (let i = 0; i < idx; i++) { if (!chunks[i].isWait) batchNum++; }
  try {
    await fetch(APPS_SCRIPT_URL + "?action=savepos&pos=" + batchNum);
  } catch(e) { /* silent fail */ }
}

// ════════════════════════════════════
//  FETCH & POLL  (Change 4)
// ════════════════════════════════════
window.addEventListener("DOMContentLoaded", prefetch);

async function fetchRaw() {
  const res = await fetch(APPS_SCRIPT_URL + "?t=" + Date.now());
  if (!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();
  return data.text || "";
}

async function prefetch() {
  const btn = document.getElementById("start-btn");
  btn.textContent = "Checking…";
  btn.disabled = true;
  btn.classList.remove("ready");
  setStatus("");

  try {
    const raw    = await fetchRaw();
    lastRawClean = raw.replace(/~/g,"");
    const parsed = parseDoc(raw);

    if (!parsed.length) {
      btn.textContent = "Doc is empty";
      setStatus("The Google Doc has no content yet.", true);
      return;
    }

    chunks = parsed;
    idx    = findSavedIdx(raw, chunks);
    const wc = chunks.filter(c => !c.isWait).length * CHUNK;
    btn.textContent = "Start";
    btn.disabled    = false;
    btn.classList.add("ready");
    setStatus("~" + wc + " words ready" + (idx > 0 ? " · resuming from batch " + (idx+1) : ""));

    setInterval(pollForUpdates, POLL_MS);

  } catch(e) {
    btn.textContent = "Could not load";
    setStatus("Failed to reach the Google Doc.", true);
    console.error(e);
  }
}

async function pollForUpdates() {
  try {
    const raw   = await fetchRaw();
    const clean = raw.replace(/~/g,"");
    if (clean === lastRawClean) return;

    const parsed = parseDoc(clean);
    if (!parsed.length) return;

    pendingChunks = parsed;
    lastRawClean  = clean;
    document.getElementById("update-badge").style.display = "block";
  } catch(e) { /* silent */ }
}

function applyUpdate() {
  if (!pendingChunks) return;
  chunks = pendingChunks;
  pendingChunks = null;
  document.getElementById("update-badge").style.display = "none";
  if (idx >= chunks.length) idx = Math.max(0, chunks.length - 1);
  if (document.getElementById("reader-screen").style.display !== "none") {
    buildParaIndex();
    render();
  }
}

// ════════════════════════════════════
//  PARA INDEX  (Change 1)
// ════════════════════════════════════
function buildParaIndex() {
  const container = document.getElementById("para-index");
  container.innerHTML = "";

  const paraLines = {};
  chunks.forEach(c => {
    if (c.isWait) return;
    if (!paraLines[c.paraIdx]) paraLines[c.paraIdx] = 0;
    paraLines[c.paraIdx]++;
  });

  Object.keys(paraLines).sort((a,b) => a-b).forEach(pi => {
    const wrap = document.createElement("div");
    wrap.className = "pi-para";
    for (let l = 0; l < paraLines[pi]; l++) {
      const seg = document.createElement("div");
      seg.className = "pi-line";
      seg.dataset.para = pi;
      seg.dataset.line = l;
      wrap.appendChild(seg);
    }
    container.appendChild(wrap);
  });
}

function updateParaIndex() {
  const c = chunks[idx];
  document.querySelectorAll(".pi-line").forEach(seg => {
    const sp = +seg.dataset.para;
    const sl = +seg.dataset.line;
    if (!c || c.isWait) { seg.className = "pi-line"; return; }
    const cp = c.paraIdx, cl = c.lineIdx;
    if (sp < cp || (sp === cp && sl < cl))      seg.className = "pi-line done";
    else if (sp === cp && sl === cl)             seg.className = "pi-line active";
    else                                         seg.className = "pi-line ahead";
  });
}

// ════════════════════════════════════
//  BACKGROUND WARM  (Change 2)
// ════════════════════════════════════
function updateBackground() {
  const c = chunks[idx];
  if (!c || c.isWait || c.totalLines <= 1) {
    document.body.style.background = "#0f0f0f";
    wordBox.style.background       = "#1a1a1a";
    wordBox.style.borderColor      = "#2a2a2a";
    return;
  }
  const t = c.lineIdx / (c.totalLines - 1); // 0 → 1
  // body: dark grey → warm dark brown
  const bR = Math.round(15 + t * 14), bG = Math.round(15 + t * 10), bB = Math.round(15 - t * 2);
  document.body.style.background = `rgb(${bR},${bG},${bB})`;
  // box: #1a1a1a → slightly warm
  const xR = Math.round(26 + t * 14), xG = Math.round(26 + t * 8), xB = Math.round(26 - t * 6);
  wordBox.style.background  = `rgb(${xR},${xG},${xB})`;
  wordBox.style.borderColor = t > 0.55 ? "#3d3020" : "#2a2a2a";
}

// ════════════════════════════════════
//  RENDER
// ════════════════════════════════════
function render() {
  [-2,-1,0,1,2].forEach((offset, i) => {
    const ci = idx + offset;
    if (ci < 0 || ci >= chunks.length) {
      rows[i].textContent      = "\u00a0";
      rows[i].style.visibility = "hidden";
      return;
    }
    rows[i].style.visibility = "visible";
    const ch = chunks[ci];
    if (i === 2) { // active slot
      rows[i].textContent = ch.isWait ? WAIT_TEXT : ch.text;
      rows[i].className   = "chunk-row " + (ch.isWait ? "wait-active" : "active");
    } else {
      rows[i].textContent = ch.isWait ? "· · ·" : ch.text;
      rows[i].className   = "chunk-row " + (ch.isWait ? (Math.abs(offset)===1 ? "wait-near" : "far") : rowKeys[i]);
    }
  });

  // Note
  const c = chunks[idx];
  document.getElementById("note-text").textContent =
    (c && !c.isWait && c.note) ? c.note : "";

  // Progress
  const pct = Math.round(((idx+1) / chunks.length) * 100);
  document.getElementById("progress-bar").style.width = pct + "%";
  document.getElementById("counter").textContent = (idx+1) + " / " + chunks.length;

  const atEnd = idx === chunks.length - 1;
  document.getElementById("restart-btn").style.display = atEnd ? "block" : "none";
  const pb = document.getElementById("prev-btn");
  const nb = document.getElementById("next-btn");
  if (pb) pb.disabled = (idx === 0);
  if (nb) nb.disabled = atEnd;

  updateParaIndex();
  updateBackground();
}

// ════════════════════════════════════
//  NAV
// ════════════════════════════════════
function go(dir) {
  const n = idx + dir;
  if (n < 0 || n >= chunks.length) return;
  idx = n;
  render();
  scheduleSave();
}

function restart() { idx = 0; render(); scheduleSave(); }

document.addEventListener("keydown", e => {
  if (!chunks.length) return;
  if (e.key === "ArrowRight") { e.preventDefault(); go(1); }
  if (e.key === "ArrowLeft")  { e.preventDefault(); go(-1); }
});

// ════════════════════════════════════
//  START
// ════════════════════════════════════
function startReading() {
  if (!chunks.length) return;
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("reader-screen").style.display = "flex";
  document.getElementById("para-index").style.display = "flex";
  buildParaIndex();
  render();
}

function setStatus(msg, isError) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className   = isError ? "error" : "";
}
</script>
</body>
</html>
