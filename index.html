<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Word by Word Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #f0f0f0;
      user-select: none;
    }

    #app {
      width: 100%;
      max-width: 860px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    #start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
    }

    #start-screen h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: #e0e0e0;
    }

    #start-screen p {
      font-size: 1rem;
      color: #888;
      max-width: 360px;
      line-height: 1.6;
    }

    #reader-screen {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    #progress-wrap {
      width: 100%;
      height: 3px;
      background: #2a2a2a;
      border-radius: 99px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      border-radius: 99px;
      transition: width 0.3s ease;
      width: 0%;
    }

    #word-box {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 2.2rem 3rem;
      overflow: hidden;
    }

    .chunk-row {
      white-space: nowrap;
      text-align: center;
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1.4;
      transition: color 0.18s ease, font-size 0.18s ease;
    }

    .chunk-row.active {
      font-size: clamp(1.8rem, 4.5vw, 2.8rem);
      color: #f0f0f0;
    }

    .chunk-row.near {
      font-size: clamp(1.1rem, 2.8vw, 1.65rem);
      color: #484848;
    }

    .chunk-row.far {
      font-size: clamp(0.85rem, 2vw, 1.2rem);
      color: #2c2c2c;
    }

    #counter {
      font-size: 0.82rem;
      color: #444;
      letter-spacing: 0.06em;
    }

    #nav-hint {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .hint-key {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: #555;
    }

    .key-badge {
      background: #222;
      border: 1px solid #383838;
      border-bottom: 3px solid #383838;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.75rem;
      color: #888;
      font-family: monospace;
    }

    #restart-btn {
      display: none;
      padding: 0.7rem 2.2rem;
      border-radius: 99px;
      border: 1px solid #6366f1;
      background: transparent;
      color: #a78bfa;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #restart-btn:hover { background: #6366f120; color: #c4b5fd; }

    #status {
      font-size: 0.9rem;
      color: #555;
      text-align: center;
    }
    #status.error { color: #f87171; }

    .btn-primary {
      padding: 0.85rem 3rem;
      border-radius: 99px;
      border: none;
      background: #2a2a2a;
      color: #555;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      cursor: not-allowed;
      transition: background 0.35s, color 0.35s, transform 0.1s;
    }
    .btn-primary.ready {
      background: #16a34a;
      color: #fff;
      cursor: pointer;
    }
    .btn-primary.ready:hover { background: #15803d; }
    .btn-primary.ready:active { transform: scale(0.97); }

    #mobile-nav { display: none; gap: 1.5rem; }
    .arrow-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #aaa;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .arrow-btn:hover { background: #252525; color: #fff; }
    .arrow-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    @media (hover: none) and (pointer: coarse) {
      #mobile-nav { display: flex; }
      #nav-hint { display: none; }
    }
  </style>
</head>
<body>
<div id="app">

  <div id="start-screen">
    <h1>Word Reader</h1>
    <p>Three words at a time. Use arrow keys to navigate.</p>
    <button class="btn-primary" id="start-btn" onclick="startReading()" disabled>Checking…</button>
    <div id="status"></div>
  </div>

  <div id="reader-screen">
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <div id="word-box"></div>
    <div id="counter"></div>
    <div id="nav-hint">
      <div class="hint-key"><span class="key-badge">←</span> back</div>
      <div class="hint-key"><span class="key-badge">→</span> forward</div>
    </div>
    <div id="mobile-nav">
      <button class="arrow-btn" id="prev-btn" onclick="go(-1)" disabled>&#8592;</button>
      <button class="arrow-btn" id="next-btn" onclick="go(1)">&#8594;</button>
    </div>
    <button id="restart-btn" onclick="restart()">Start over</button>
  </div>

</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRsYNrap81KO4eG8L2JaDp0LL6OTHcyIRUO3Cqv7AZ7Ab5J5TFagLNL5TE3XhGJrqFZA/exec";
  const CHUNK = 3;

  let chunks = [];
  let idx = 0;

  // Build 5 fixed row elements once
  const box = document.getElementById("word-box");
  const rowDefs = ["far", "near", "active", "near", "far"];
  const rows = rowDefs.map(cls => {
    const d = document.createElement("div");
    d.className = "chunk-row " + cls;
    box.appendChild(d);
    return d;
  });

  function setStatus(msg, isError) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = isError ? "error" : "";
  }

  window.addEventListener("DOMContentLoaded", prefetch);

  async function prefetch() {
    const btn = document.getElementById("start-btn");
    btn.textContent = "Checking\u2026";
    btn.disabled = true;
    btn.classList.remove("ready");
    setStatus("");

    try {
      const res = await fetch(APPS_SCRIPT_URL);
      if (!res.ok) throw new Error("Network error");
      const data = await res.json();
      const raw = data.text || "";
      const words = raw.split(/\s+/).filter(w => w.length > 0);

      if (words.length === 0) {
        btn.textContent = "Doc is empty";
        setStatus("The Google Doc has no content yet.", true);
        return;
      }

      chunks = [];
      for (let i = 0; i < words.length; i += CHUNK) {
        chunks.push(words.slice(i, i + CHUNK).join(" "));
      }

      btn.textContent = "Start";
      btn.disabled = false;
      btn.classList.add("ready");
      setStatus(words.length + " words ready");

    } catch (e) {
      btn.textContent = "Could not load";
      setStatus("Failed to reach the Google Doc. Check the Apps Script URL.", true);
      console.error(e);
    }
  }

  function startReading() {
    if (!chunks.length) return;
    idx = 0;
    document.getElementById("start-screen").style.display = "none";
    document.getElementById("reader-screen").style.display = "flex";
    render();
  }

  function render() {
    // rows[0]=idx-2, rows[1]=idx-1, rows[2]=idx, rows[3]=idx+1, rows[4]=idx+2
    [-2, -1, 0, 1, 2].forEach((offset, i) => {
      const ci = idx + offset;
      if (ci >= 0 && ci < chunks.length) {
        rows[i].textContent = chunks[ci];
        rows[i].style.visibility = "visible";
      } else {
        rows[i].textContent = "\u00a0";
        rows[i].style.visibility = "hidden";
      }
    });

    const pct = Math.round(((idx + 1) / chunks.length) * 100);
    document.getElementById("progress-bar").style.width = pct + "%";
    document.getElementById("counter").textContent = (idx + 1) + " / " + chunks.length;

    const atEnd = idx === chunks.length - 1;
    document.getElementById("restart-btn").style.display = atEnd ? "block" : "none";
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    if (prevBtn) prevBtn.disabled = idx === 0;
    if (nextBtn) nextBtn.disabled = atEnd;
  }

  function go(dir) {
    const n = idx + dir;
    if (n < 0 || n >= chunks.length) return;
    idx = n;
    render();
  }

  function restart() { idx = 0; render(); }

  document.addEventListener("keydown", e => {
    if (!chunks.length) return;
    if (e.key === "ArrowRight") { e.preventDefault(); go(1); }
    if (e.key === "ArrowLeft")  { e.preventDefault(); go(-1); }
  });
</script>
</body>
</html>
