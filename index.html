<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Word by Word Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #f0f0f0;
      user-select: none;
    }

    #app {
      width: 100%;
      max-width: 700px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    /* ── Start screen ── */
    #start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
    }

    #start-screen h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: #e0e0e0;
    }

    #start-screen p {
      font-size: 1rem;
      color: #888;
      max-width: 360px;
      line-height: 1.6;
    }

    /* ── Reader screen ── */
    #reader-screen { display: none; width: 100%; flex-direction: column; align-items: center; gap: 2.5rem; }

    /* Progress bar */
    #progress-wrap {
      width: 100%;
      height: 3px;
      background: #2a2a2a;
      border-radius: 99px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      border-radius: 99px;
      transition: width 0.3s ease;
      width: 0%;
    }

    /* Word display */
    #word-box {
      width: 100%;
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 2rem;
    }

    #words {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: #f5f5f5;
      text-align: center;
      line-height: 1.3;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    #words.fade { opacity: 0; transform: scale(0.96); }

    /* Counter */
    #counter {
      font-size: 0.85rem;
      color: #555;
      letter-spacing: 0.05em;
    }

    /* Nav hint */
    #nav-hint {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .hint-key {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: #666;
    }

    .key-badge {
      background: #222;
      border: 1px solid #383838;
      border-bottom: 3px solid #383838;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.75rem;
      color: #aaa;
      font-family: monospace;
    }

    /* Start over button */
    #restart-btn {
      display: none;
      padding: 0.75rem 2.5rem;
      border-radius: 99px;
      border: 1px solid #6366f1;
      background: transparent;
      color: #a78bfa;
      font-size: 1rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #restart-btn:hover { background: #6366f120; color: #c4b5fd; }

    /* Loading / error states */
    #status {
      font-size: 0.9rem;
      color: #666;
      text-align: center;
    }
    #status.error { color: #f87171; }

    /* Buttons shared style */
    .btn-primary {
      padding: 0.85rem 3rem;
      border-radius: 99px;
      border: none;
      background: #6366f1;
      color: #fff;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }

    /* Mobile arrow buttons */
    #mobile-nav {
      display: none;
      gap: 1.5rem;
    }
    .arrow-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #aaa;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .arrow-btn:hover { background: #252525; color: #fff; }
    .arrow-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    @media (hover: none) and (pointer: coarse) {
      #mobile-nav { display: flex; }
      #nav-hint { display: none; }
    }
    @media (max-width: 500px) {
      #words { font-size: 2rem; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- START SCREEN -->
  <div id="start-screen">
    <h1>Word Reader</h1>
    <p>Three words at a time. Navigate with your arrow keys — or the buttons below on mobile.</p>
    <button class="btn-primary" id="start-btn" onclick="startReading()">Start</button>
    <div id="status"></div>
  </div>

  <!-- READER SCREEN -->
  <div id="reader-screen">
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <div id="word-box"><div id="words"></div></div>
    <div id="counter"></div>
    <div id="nav-hint">
      <div class="hint-key"><span class="key-badge">←</span> back</div>
      <div class="hint-key"><span class="key-badge">→</span> forward</div>
    </div>
    <div id="mobile-nav">
      <button class="arrow-btn" id="prev-btn" onclick="go(-1)" disabled>&#8592;</button>
      <button class="arrow-btn" id="next-btn" onclick="go(1)">&#8594;</button>
    </div>
    <button id="restart-btn" onclick="restart()">Start over</button>
  </div>

</div>

<script>
  // ══════════════════════════════════════════════
  //  CONFIGURATION — paste your Apps Script URL here
  // ══════════════════════════════════════════════
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRsYNrap81KO4eG8L2JaDp0LL6OTHcyIRUO3Cqv7AZ7Ab5J5TFagLNL5TE3XhGJrqFZA/exec";
  // ══════════════════════════════════════════════

  const CHUNK = 3; // words per screen
  let chunks = [];
  let idx = 0;

  function setStatus(msg, isError = false) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = isError ? "error" : "";
  }

  async function startReading() {
    const btn = document.getElementById("start-btn");
    btn.disabled = true;
    setStatus("Loading from Google Doc…");

    try {
      const res = await fetch(APPS_SCRIPT_URL);
      if (!res.ok) throw new Error("Network response was not ok");
      const data = await res.json();
      const raw = data.text || "";

      // Split into words, strip blanks
      const words = raw.split(/\s+/).filter(w => w.length > 0);
      if (words.length === 0) throw new Error("Document appears to be empty.");

      // Group into chunks of CHUNK words
      chunks = [];
      for (let i = 0; i < words.length; i += CHUNK) {
        chunks.push(words.slice(i, i + CHUNK).join(" "));
      }
      idx = 0;
      showReader();
    } catch (e) {
      btn.disabled = false;
      setStatus("Could not load the document. Check the Apps Script URL and try again.", true);
      console.error(e);
    }
  }

  function showReader() {
    document.getElementById("start-screen").style.display = "none";
    const rs = document.getElementById("reader-screen");
    rs.style.display = "flex";
    render();
  }

  function render(direction = 0) {
    const wordsEl = document.getElementById("words");
    const counter = document.getElementById("counter");
    const bar = document.getElementById("progress-bar");
    const restartBtn = document.getElementById("restart-btn");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");

    // Fade out → update → fade in
    wordsEl.classList.add("fade");
    setTimeout(() => {
      wordsEl.textContent = chunks[idx];
      wordsEl.classList.remove("fade");
    }, 150);

    const pct = Math.round(((idx + 1) / chunks.length) * 100);
    bar.style.width = pct + "%";
    counter.textContent = (idx + 1) + " / " + chunks.length;

    const atEnd = idx === chunks.length - 1;
    restartBtn.style.display = atEnd ? "block" : "none";
    if (prevBtn) prevBtn.disabled = idx === 0;
    if (nextBtn) nextBtn.disabled = atEnd;
  }

  function go(dir) {
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= chunks.length) return;
    idx = newIdx;
    render(dir);
  }

  function restart() {
    idx = 0;
    render();
  }

  document.addEventListener("keydown", (e) => {
    if (chunks.length === 0) return;
    if (e.key === "ArrowRight") { e.preventDefault(); go(1); }
    if (e.key === "ArrowLeft")  { e.preventDefault(); go(-1); }
  });
</script>
</body>
</html>
