<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Block Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 2rem;
      background: #0f0f0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #f0f0f0;
      user-select: none;
    }

    #app {
      width: 100%;
      max-width: 900px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* ── Start screen ── */
    #start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
    }
    #start-screen h1 { font-size: 2rem; font-weight: 300; letter-spacing: 0.08em; color: #e0e0e0; }
    #start-screen p  { font-size: 1rem; color: #888; max-width: 360px; line-height: 1.6; }

    /* ── Reader screen ── */
    #reader-screen { display: none; width: 100%; flex-direction: column; align-items: center; gap: 2rem; }

    /* ── Karaoke box ── */
    #word-box {
      width: 100%;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 1.8rem 2rem;
      overflow-y: auto;
      max-height: 420px;
    }

    #words {
      width: 100%;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    #words.fade { opacity: 0; transform: scale(0.98); }

    .block-title {
      font-size: 1.1rem;
      font-weight: 500;
      color: #e0e0e0;
      letter-spacing: 0.03em;
      margin-bottom: 1rem;
    }

    .block-bullets {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .block-bullets li {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      font-size: 1.1rem;
      font-weight: 300;
      color: #c0c0c0;
      line-height: 1.55;
    }

    .block-bullets li .bullet-num {
      color: #6366f1;
      font-size: 1.1rem;
      font-weight: 500;
      flex-shrink: 0;
      min-width: 1.4rem;
    }

    .sub-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-top: 0.4rem;
      padding-left: 0.4rem;
    }

    .sub-items li {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.95rem;
      font-weight: 300;
      color: #888;
      line-height: 1.5;
    }

    .sub-items li::before {
      content: '○';
      color: #555;
      font-size: 0.75rem;
      margin-top: 0.2em;
      flex-shrink: 0;
    }

    /* ── Progress bar ── */
    #progress-wrap {
      width: 100%;
      height: 3px;
      background: #2a2a2a;
      border-radius: 99px;
      overflow: visible;
      position: relative;
      margin: 1.4rem 0;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      border-radius: 99px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .milestone-dot {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #facc15;
      box-shadow: 0 0 4px #facc1599;
      pointer-events: none;
    }
    .milestone-label {
      position: absolute;
      transform: translateX(-50%);
      font-size: 0.62rem;
      color: #facc15aa;
      white-space: nowrap;
      pointer-events: none;
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .milestone-label.above { top: -1.6rem; }
    .milestone-label.below { bottom: -1.6rem; }

    /* ── Counter ── */
    #counter { font-size: 0.85rem; color: #555; letter-spacing: 0.05em; }

    /* ── Nav hint ── */
    #nav-hint { display: flex; gap: 1.5rem; align-items: center; }
    .hint-key { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: #666; }
    .key-badge {
      background: #222;
      border: 1px solid #383838;
      border-bottom: 3px solid #383838;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.75rem;
      color: #aaa;
      font-family: monospace;
    }

    /* ── Restart button ── */
    #restart-btn {
      display: none;
      padding: 0.75rem 2.5rem;
      border-radius: 99px;
      border: 1px solid #6366f1;
      background: transparent;
      color: #a78bfa;
      font-size: 1rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #restart-btn:hover { background: #6366f120; color: #c4b5fd; }

    /* ── Notes box ── */
    #notes-box {
      width: 100%;
      min-height: 360px;
      max-height: 660px;
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 1.2rem 1.5rem;
      overflow-y: auto;
      color: #f5f5f5;
      font-size: 0.85rem;
      line-height: 1.6;
      text-align: left;
      white-space: pre-wrap;
    }

    /* ── Update button ── */
    #update-btn {
      display: none;
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      padding: 0.6rem 1.2rem;
      border-radius: 99px;
      border: none;
      background: #16a34a;
      color: #fff;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 2px 12px #16a34a55;
      transition: background 0.2s, transform 0.1s;
      z-index: 999;
    }
    #update-btn:hover { background: #15803d; }
    #update-btn:active { transform: scale(0.96); }

    /* ── Status / primary button ── */
    #status { font-size: 0.9rem; color: #666; text-align: center; }
    #status.error { color: #f87171; }

    .btn-primary {
      padding: 0.85rem 3rem;
      border-radius: 99px;
      border: none;
      background: #333;
      color: #666;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      cursor: not-allowed;
      transition: background 0.35s, color 0.35s, transform 0.1s;
    }
    .btn-primary.ready { background: #16a34a; color: #fff; cursor: pointer; }
    .btn-primary.ready:hover { background: #15803d; }
    .btn-primary.ready:active { transform: scale(0.97); }

    /* ── Mobile nav ── */
    #mobile-nav { display: none; gap: 1.5rem; }
    .arrow-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #aaa;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .arrow-btn:hover { background: #252525; color: #fff; }
    .arrow-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    @media (hover: none) and (pointer: coarse) {
      #mobile-nav { display: flex; }
      #nav-hint { display: none; }
    }
  </style>
</head>
<body>
<button id="update-btn" onclick="applyUpdate()">New content. Update?</button>
<div id="app">

  <!-- START SCREEN -->
  <div id="start-screen">
    <h1>Block Reader</h1>
    <p>One block at a time. Navigate with your arrow keys.</p>
    <button class="btn-primary" id="start-btn" onclick="startReading()" disabled>Checking…</button>
    <div id="status"></div>
  </div>

  <!-- READER SCREEN -->
  <div id="reader-screen">
    <div id="word-box"><div id="words"></div></div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <div id="counter"></div>
    <div id="nav-hint">
      <div class="hint-key"><span class="key-badge">←</span> back</div>
      <div class="hint-key"><span class="key-badge">→</span> forward</div>
    </div>
    <div id="mobile-nav">
      <button class="arrow-btn" id="prev-btn" onclick="go(-1)" disabled>&#8592;</button>
      <button class="arrow-btn" id="next-btn" onclick="go(1)">&#8594;</button>
    </div>
    <button id="restart-btn" onclick="restart()">Start over</button>
    <div id="notes-box"></div>
  </div>

</div>
<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzjl4d6cVqwnDbCiTOPaQwpm6dfCGp5J7ATjFatOvmnjmOAlVnsi1BO3QkmsORCCk2n/exec";

  let blocks = [];        // array of { title, bullets: [] }
  let milestonePcts = []; // % left position for each block boundary dot
  let blockPcts = [];     // % progress bar fill for each block index
  let idx = 0;
  let lastRawText = "";
  let karaokeRaw = "";
  let pendingBlocks = [];
  let pendingMilestones = [];
  let pendingBlockPcts = [];

  function setStatus(msg, isError = false) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = isError ? "error" : "";
  }

  function splitDoc(raw) {
    const lines = raw.split(/\n/);
    const splitIdx = lines.findIndex(l => parseLine(l).text === 'xxxx');
    if (splitIdx === -1) return { karaoke: raw, notes: "" };
    return {
      karaoke: lines.slice(0, splitIdx).join("\n"),
      notes: lines.slice(splitIdx + 1).join("\n").trim()
    };
  }

  function setNotesBox(text) {
    const cleaned = text.split(/\n/)
      .map(l => parseLine(l.trim()).text)
      .filter(l => l.length > 0)
      .join("\n");
    document.getElementById("notes-box").textContent = cleaned;
  }

  function parseLine(raw) {
    const m = raw.match(/^(\d+|p)\|(.*)$/);
    if (!m) return { level: 'p', text: raw.trim() };
    return { level: m[1] === 'p' ? 'p' : parseInt(m[1]), text: m[2].trim() };
  }

  function buildBlocks(karaokeText) {
    // Split on ~~~~ separators
    const lines = karaokeText.split(/\n/).map(l => l.trim()).filter(l => l.length > 0);
    // Some lines may have ~~~~ appended after \r — split those out
    const expanded = [];
    for (const line of lines) {
      const parts = line.split(/\r/).map(p => p.trim()).filter(p => p.length > 0);
      expanded.push(...parts);
    }
    console.log("RAW LINES:", expanded);

    const rawBlocks = [];
    let current = [];
    for (const line of expanded) {
      const { level, text } = parseLine(line);
      if (level === 'p') {
        // p| line = block title, starts a new block
        if (current.length > 0) rawBlocks.push(current);
        // strip leading "1. " / "2. " etc from title
        current = [{ level: 'title', text: text.replace(/^\d+\.\s*/, "") }];
      } else if (level === 0) {
        // filled-dot sub-bullet
        current.push({ level: 0, text });
      } else if (level === 1) {
        // hollow-dot sub-sub-bullet
        current.push({ level: 1, text });
      }
    }
    if (current.length > 0) rawBlocks.push(current);    if (current.length > 0) rawBlocks.push(current);

    const built = [];
    let totalWords = 0;

    for (const block of rawBlocks) {
      if (block.length === 0) continue;

      const title = block[0].text;
      const bullets = [];
      let currentSub = null;
      let subNum = 1;

      for (const entry of block.slice(1)) {
        if (entry.level === 0) {
          currentSub = { num: subNum++, text: entry.text, subItems: [] };
          bullets.push(currentSub);
        } else if (entry.level === 1 && currentSub) {
          currentSub.subItems.push(entry.text);
        }
      }

      const wordCount = block.map(e => e.text).join(" ").split(/\s+/).filter(w => w.length > 0).length;
      totalWords += wordCount;
      built.push({ title, bullets, wordCount });
    }

    // Milestone dots: placed at cumulative word-count boundaries between blocks
    // position = cumulative words up to end of block / total words * 100
    const milestones = [];
    const cumulativeWordPcts = [];
    let cumulative = 0;
    for (let i = 0; i < built.length; i++) {
      cumulative += built[i].wordCount;
      const pct = (cumulative / totalWords) * 100;
      cumulativeWordPcts.push(pct);
      // include ALL blocks as milestone dots, including the last
      milestones.push({ pct, title: built[i].title });
    }

    return { built, milestones, totalWords, cumulativeWordPcts };
  }

  window.addEventListener("DOMContentLoaded", prefetch);

  async function prefetch() {
    const btn = document.getElementById("start-btn");
    btn.textContent = "Checking…";
    btn.disabled = true;
    btn.classList.remove("ready");
    setStatus("");

    try {
      const res = await fetch(APPS_SCRIPT_URL);
      if (!res.ok) throw new Error("Network error");
      const data = await res.json();
      const raw = data.text || "";
      console.log("FULL RAW:\n", data.text);
      const { karaoke, notes } = splitDoc(raw);

      if (karaoke.trim().length === 0) {
        btn.textContent = "Doc is empty";
        setStatus("The Google Doc has no content yet.", true);
        return;
      }

      const { built, milestones, totalWords, cumulativeWordPcts } = buildBlocks(karaoke);
      blocks = built;
      milestonePcts = milestones;
      blockPcts = cumulativeWordPcts;
      karaokeRaw = karaoke;
      lastRawText = raw;

      if (notes) setNotesBox(notes);

      btn.textContent = "Start";
      btn.disabled = false;
      btn.classList.add("ready");
      setStatus(totalWords + " words · " + blocks.length + " blocks");

      startPolling();
    } catch (e) {
      btn.textContent = "Could not load";
      setStatus("Failed to reach the Google Doc. Check the Apps Script URL.", true);
      console.error(e);
    }
  }

  function startPolling() {
    setInterval(async () => {
      try {
        const res = await fetch(APPS_SCRIPT_URL);
        if (!res.ok) return;
        const data = await res.json();
        const raw = data.text || "";
        if (raw === lastRawText) return;

        const { karaoke, notes } = splitDoc(raw);
        lastRawText = raw;

        setNotesBox(notes);

        if (karaoke !== karaokeRaw) {
          const { built, milestones, cumulativeWordPcts } = buildBlocks(karaoke);
          pendingBlocks = built;
          pendingMilestones = milestones;
          pendingBlockPcts = cumulativeWordPcts;

          const oldCount = karaokeRaw.split(/\s+/).filter(w => w.length > 0).length;
          const newCount = karaoke.split(/\s+/).filter(w => w.length > 0).length;
          const diff = newCount - oldCount;
          const label = diff === 0
            ? "New Content. Updated."
            : diff > 0
              ? `New Content. ${diff} extra words.`
              : `New Content. ${Math.abs(diff)} less words.`;

          const updateBtn = document.getElementById("update-btn");
          updateBtn.textContent = label;
          updateBtn.style.display = "block";
        }
      } catch (_) {}
    }, 1500);
  }

  function applyUpdate() {
    blocks = pendingBlocks;
    milestonePcts = pendingMilestones;
    blockPcts = pendingBlockPcts;
    karaokeRaw = splitDoc(lastRawText).karaoke;
    pendingBlocks = [];
    pendingMilestones = [];
    pendingBlockPcts = [];
    document.getElementById("update-btn").style.display = "none";

    const readerVisible = document.getElementById("reader-screen").style.display === "flex";
    if (readerVisible) {
      idx = Math.min(idx, blocks.length - 1);
      renderMilestones();
      render();
    }
  }

  function startReading() {
    if (blocks.length === 0) return;
    idx = 0;
    document.getElementById("start-screen").style.display = "none";
    const rs = document.getElementById("reader-screen");
    rs.style.display = "flex";
    renderMilestones();
    render();
  }

  function renderMilestones() {
    const wrap = document.getElementById("progress-wrap");
    wrap.querySelectorAll(".milestone-dot, .milestone-label").forEach(d => d.remove());
    milestonePcts.forEach(({ pct, title }, i) => {
      const dot = document.createElement("div");
      dot.className = "milestone-dot";
      dot.style.left = pct + "%";

      const label = document.createElement("div");
      label.className = "milestone-label " + (i % 2 === 0 ? "above" : "below");
      label.style.left = pct + "%";
      label.textContent = title;

      wrap.appendChild(label);
      wrap.appendChild(dot);
    });
  }

  function render() {
    const wordsEl = document.getElementById("words");
    const counter = document.getElementById("counter");
    const bar = document.getElementById("progress-bar");
    const restartBtn = document.getElementById("restart-btn");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");

    wordsEl.classList.add("fade");
    setTimeout(() => {
      const block = blocks[idx];

      // Build HTML: title + bullet list
      let html = `<div class="block-title">${escHtml(block.title)}</div>`;
      if (block.bullets.length > 0) {
        html += `<ul class="block-bullets">`;
        for (const b of block.bullets) {
          html += `<li><span class="bullet-num">${b.num}.</span><div>`;
          html += escHtml(b.text);
          if (b.subItems && b.subItems.length > 0) {
            html += `<ul class="sub-items">`;
            for (const s of b.subItems) {
              html += `<li>${escHtml(s)}</li>`;
            }
            html += `</ul>`;
          }
          html += `</div></li>`;
        }
        html += `</ul>`;
      }
      wordsEl.innerHTML = html;
      wordsEl.classList.remove("fade");
    }, 150);

    const pct = blockPcts.length > 0 ? Math.round(blockPcts[idx]) : Math.round(((idx + 1) / blocks.length) * 100);
    bar.style.width = pct + "%";    counter.textContent = (idx + 1) + " / " + blocks.length;

    const atEnd = idx === blocks.length - 1;
    restartBtn.style.display = atEnd ? "block" : "none";
    if (prevBtn) prevBtn.disabled = idx === 0;
    if (nextBtn) nextBtn.disabled = atEnd;
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function go(dir) {
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= blocks.length) return;
    idx = newIdx;
    render();
  }

  function restart() {
    idx = 0;
    render();
  }

  document.addEventListener("keydown", (e) => {
    if (blocks.length === 0) return;
    if (e.key === "ArrowRight") { e.preventDefault(); go(1); }
    if (e.key === "ArrowLeft")  { e.preventDefault(); go(-1); }
    if (e.key === "ArrowDown")  { e.preventDefault(); rotateBullets(1); }
    if (e.key === "ArrowUp")    { e.preventDefault(); rotateBullets(-1); }
  });

  function rotateBullets(dir) {
    const block = blocks[idx];
    if (!block || block.bullets.length < 2) return;
    if (dir === 1) {
      // rotate down: first goes to last → 1,2,3,4 becomes 2,3,4,1
      block.bullets.push(block.bullets.shift());
    } else {
      // rotate up: last comes to first → 1,2,3,4 becomes 4,1,2,3
      block.bullets.unshift(block.bullets.pop());
    }
    render();
  }
</script>
</body>
</html>
