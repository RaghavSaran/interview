<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Block Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 2rem;
      background: #0f0f0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #f0f0f0;
      user-select: none;
    }

    #app {
      width: 100%;
      max-width: 900px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* ── Reader screen ── */
    #reader-screen { display: flex; width: 100%; flex-direction: column; align-items: center; gap: 2rem; }

    /* ── Karaoke box + preview layout ── */
    #box-row {
      width: 100%;
      display: flex;
      gap: 1rem;
      align-items: stretch;
    }

    #word-box {
      flex: 3;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 1.8rem 2rem;
      overflow-y: auto;
      max-height: 420px;
    }

    #preview-box {
      flex: 1;
      min-height: 260px;
      max-height: 420px;
      display: flex;
      flex-direction: column;
      background: #141414;
      border: 1px solid #242424;
      border-radius: 20px;
      padding: 1.2rem 1.3rem;
      overflow-y: auto;
      opacity: 0.75;
      position: relative;
    }

    #preview-box.empty { visibility: hidden; }

    #preview-box .preview-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 0.6rem;
    }

    #preview-box .block-title {
      font-size: 0.85rem;
      margin-bottom: 0.6rem;
    }

    #preview-box .block-bullets li {
      font-size: 0.78rem;
      line-height: 1.45;
      gap: 0.4rem;
    }

    #preview-box .block-bullets li .bullet-num {
      font-size: 0.78rem;
      min-width: 1rem;
    }

    #preview-box .sub-items li {
      font-size: 0.68rem;
      line-height: 1.4;
    }

    /* ── Preview width controls ── */
    #preview-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: #666;
      margin-top: -0.5rem;
    }
    #preview-controls .ctrl-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #aaa;
      font-size: 0.9rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    #preview-controls .ctrl-btn:hover { background: #252525; color: #fff; }
    #preview-controls .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #preview-controls .ctrl-label { letter-spacing: 0.05em; }

    #words {
      width: 100%;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    #words.fade { opacity: 0; transform: scale(0.98); }

    .block-title {
      font-size: 1.1rem;
      font-weight: 500;
      color: #e0e0e0;
      letter-spacing: 0.03em;
      margin-bottom: 1rem;
    }

    .block-bullets {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .block-bullets li {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      font-size: 1.1rem;
      font-weight: 300;
      color: #c0c0c0;
      line-height: 1.55;
    }

    .block-bullets li .bullet-num {
      color: #6366f1;
      font-size: 1.1rem;
      font-weight: 500;
      flex-shrink: 0;
      min-width: 1.4rem;
    }

    .sub-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-top: 0.4rem;
      padding-left: 0.4rem;
    }

    .sub-items li {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.95rem;
      font-weight: 300;
      color: #888;
      line-height: 1.5;
    }

    .sub-items li::before {
      content: '○';
      color: #555;
      font-size: 0.75rem;
      margin-top: 0.2em;
      flex-shrink: 0;
    }

    /* ── Progress bar ── */
    #progress-wrap {
      width: 100%;
      height: 3px;
      background: #2a2a2a;
      border-radius: 99px;
      overflow: visible;
      position: relative;
      margin: 1.4rem 0;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      border-radius: 99px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .milestone-dot {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #facc15;
      box-shadow: 0 0 4px #facc1599;
      pointer-events: none;
    }
    .milestone-label {
      position: absolute;
      transform: translateX(-50%);
      font-size: 0.62rem;
      color: #facc15aa;
      white-space: nowrap;
      pointer-events: none;
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .milestone-label.above { top: -1.6rem; }
    .milestone-label.below { bottom: -1.6rem; }

    /* ── Counter ── */
    #counter { font-size: 0.85rem; color: #555; letter-spacing: 0.05em; }

    /* ── Nav hint ── */
    #nav-hint { display: flex; gap: 1.5rem; align-items: center; }
    .hint-key { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: #666; }
    .key-badge {
      background: #222;
      border: 1px solid #383838;
      border-bottom: 3px solid #383838;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.75rem;
      color: #aaa;
      font-family: monospace;
    }

    /* ── Restart button ── */
    #restart-btn {
      display: none;
      padding: 0.75rem 2.5rem;
      border-radius: 99px;
      border: 1px solid #6366f1;
      background: transparent;
      color: #a78bfa;
      font-size: 1rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #restart-btn:hover { background: #6366f120; color: #c4b5fd; }

    /* ── Notes box ── */
    #notes-box {
      width: 100%;
      min-height: 360px;
      max-height: 660px;
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 1.2rem 1.5rem;
      overflow-y: auto;
      color: #f5f5f5;
      font-size: 0.85rem;
      line-height: 1.6;
      text-align: left;
      white-space: pre-wrap;
    }

    /* ── Status ── */
    #status { font-size: 0.85rem; color: #666; text-align: center; }
    #status.error { color: #f87171; }

    /* ── Mobile nav ── */
    #mobile-nav { display: none; gap: 1.5rem; }
    .arrow-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #aaa;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .arrow-btn:hover { background: #252525; color: #fff; }
    .arrow-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    @media (hover: none) and (pointer: coarse) {
      #mobile-nav { display: flex; }
      #nav-hint { display: none; }
      #box-row { flex-direction: column; }
      #preview-box { min-height: 140px; max-height: 200px; }
      #preview-controls { display: none; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- READER SCREEN -->
  <div id="reader-screen">
    <div id="box-row">
      <div id="word-box"><div id="words"></div></div>
      <div id="preview-box">
        <div class="preview-label">Up next</div>
        <div id="preview-words"></div>
      </div>
    </div>
    <div id="preview-controls">
      <span class="ctrl-label">Preview width</span>
      <button class="ctrl-btn" id="preview-minus" onclick="adjustPreview(-1)" title="Shrink preview">−</button>
      <button class="ctrl-btn" id="preview-plus" onclick="adjustPreview(1)" title="Grow preview">+</button>
    </div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <div id="counter"></div>
    <div id="nav-hint">
      <div class="hint-key"><span class="key-badge">←</span> back</div>
      <div class="hint-key"><span class="key-badge">→</span> forward</div>
    </div>
    <div id="mobile-nav">
      <button class="arrow-btn" id="prev-btn" onclick="go(-1)" disabled>&#8592;</button>
      <button class="arrow-btn" id="next-btn" onclick="go(1)">&#8594;</button>
    </div>
    <button id="restart-btn" onclick="restart()">Start over</button>
    <div id="status"></div>
    <div id="notes-box"></div>
  </div>

</div>
<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzjl4d6cVqwnDbCiTOPaQwpm6dfCGp5J7ATjFatOvmnjmOAlVnsi1BO3QkmsORCCk2n/exec";

  let blocks = [];        // array of { title, bullets: [] }
  let milestonePcts = []; // % left position for each block boundary dot
  let blockPcts = [];     // % progress bar fill for each block index
  let idx = 0;
  let lastRawText = "";
  let lastNotesText = "";
  let karaokeRaw = "";

  function setStatus(msg, isError = false) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = isError ? "error" : "";
  }

  function setNotesBox(text) {
    document.getElementById("notes-box").textContent = text || "";
  }

  function parseLine(raw) {
    const m = raw.match(/^(\d+|p)\|(.*)$/);
    if (!m) return { level: 'p', text: raw.trim() };
    return { level: m[1] === 'p' ? 'p' : parseInt(m[1]), text: m[2].trim() };
  }

  function buildBlocks(karaokeText) {
    // Split on ~~~~ separators
    const lines = karaokeText.split(/\n/).map(l => l.trim()).filter(l => l.length > 0);
    // Some lines may have ~~~~ appended after \r — split those out
    const expanded = [];
    for (const line of lines) {
      const parts = line.split(/\r/).map(p => p.trim()).filter(p => p.length > 0);
      expanded.push(...parts);
    }
    console.log("RAW LINES:", expanded);

    const rawBlocks = [];
    let current = [];
    for (const line of expanded) {
      const { level, text } = parseLine(line);
      if (level === 'p') {
        // p| line = block title, starts a new block
        if (current.length > 0) rawBlocks.push(current);
        // strip leading "1. " / "2. " etc from title
        current = [{ level: 'title', text: text.replace(/^\d+\.\s*/, "") }];
      } else if (level === 0) {
        // filled-dot sub-bullet
        current.push({ level: 0, text });
      } else if (level === 1) {
        // hollow-dot sub-sub-bullet
        current.push({ level: 1, text });
      }
    }
    if (current.length > 0) rawBlocks.push(current);

    const built = [];
    let totalWords = 0;

    for (const block of rawBlocks) {
      if (block.length === 0) continue;

      const title = block[0].text;
      const bullets = [];
      let currentSub = null;
      let subNum = 1;

      for (const entry of block.slice(1)) {
        if (entry.level === 0) {
          currentSub = { num: subNum++, text: entry.text, subItems: [] };
          bullets.push(currentSub);
        } else if (entry.level === 1 && currentSub) {
          currentSub.subItems.push(entry.text);
        }
      }

      const wordCount = block.map(e => e.text).join(" ").split(/\s+/).filter(w => w.length > 0).length;
      totalWords += wordCount;
      built.push({ title, bullets, wordCount });
    }

    // Milestone dots: placed at cumulative word-count boundaries between blocks
    // position = cumulative words up to end of block / total words * 100
    const milestones = [];
    const cumulativeWordPcts = [];
    let cumulative = 0;
    for (let i = 0; i < built.length; i++) {
      cumulative += built[i].wordCount;
      const pct = (cumulative / totalWords) * 100;
      cumulativeWordPcts.push(pct);
      // include ALL blocks as milestone dots, including the last
      milestones.push({ pct, title: built[i].title });
    }

    return { built, milestones, totalWords, cumulativeWordPcts };
  }

  window.addEventListener("DOMContentLoaded", () => {
    applyPreviewRatio();
    const wordsEl = document.getElementById("words");
    if (wordsEl) wordsEl.innerHTML = `<div class="block-title" style="color:#666">Loading…</div>`;
    prefetch();
  });

  async function prefetch() {
    setStatus("");

    try {
      const res = await fetch(APPS_SCRIPT_URL);
      if (!res.ok) throw new Error("Network error");
      const data = await res.json();
      const raw = data.text || "";
      const notes = data.notesText || "";
      console.log("FULL RAW:\n", data.text);

      if (raw.trim().length === 0) {
        setStatus("The Google Doc has no content yet.", true);
        const wordsEl = document.getElementById("words");
        if (wordsEl) wordsEl.innerHTML = `<div class="block-title" style="color:#666">Doc is empty</div>`;
        return;
      }

      const { built, milestones, totalWords, cumulativeWordPcts } = buildBlocks(raw);
      blocks = built;
      milestonePcts = milestones;
      blockPcts = cumulativeWordPcts;
      karaokeRaw = raw;
      lastRawText = raw;
      lastNotesText = notes;

      setNotesBox(notes);
      setStatus(totalWords + " words · " + blocks.length + " blocks");

      idx = 0;
      renderMilestones();
      render();

      startPolling();
    } catch (e) {
      setStatus("Failed to reach the Google Doc. Check the Apps Script URL.", true);
      const wordsEl = document.getElementById("words");
      if (wordsEl) wordsEl.innerHTML = `<div class="block-title" style="color:#f87171">Could not load</div>`;
      console.error(e);
    }
  }

  function startPolling() {
    setInterval(async () => {
      try {
        const res = await fetch(APPS_SCRIPT_URL);
        if (!res.ok) return;
        const data = await res.json();
        const raw = data.text || "";
        const notes = data.notesText || "";
        const mainChanged = raw !== lastRawText;
        const notesChanged = notes !== lastNotesText;
        if (!mainChanged && !notesChanged) return;

        lastRawText = raw;

        if (notesChanged) {
          lastNotesText = notes;
          setNotesBox(notes);
        }

        if (mainChanged && raw !== karaokeRaw) {
          applyNewContent(raw);
        }
      } catch (_) {}
    }, 1000);
  }

  // Apply new doc content immediately while keeping the user on the same
  // block when possible. Strategy:
  //   1. Remember the current block's title (and titles of previous blocks).
  //   2. Rebuild blocks from the new raw text.
  //   3. If the current block's title still exists, jump idx to it.
  //   4. Otherwise, walk backward through the previously-seen titles and
  //      land on the most recent one that still exists. This means if
  //      block 7 was deleted from 10 blocks, we land on what was block 6.
  //   5. If none of the previous titles survive, clamp to the last block.
  function applyNewContent(raw) {
    const { built, milestones, cumulativeWordPcts } = buildBlocks(raw);
    if (built.length === 0) {
      // Doc became empty — keep previous render; nothing useful to show.
      karaokeRaw = raw;
      return;
    }

    // Snapshot prior titles in order so we can find the best anchor.
    const priorTitles = blocks.map(b => b.title);
    const anchorIdx = Math.min(idx, priorTitles.length - 1);

    blocks = built;
    milestonePcts = milestones;
    blockPcts = cumulativeWordPcts;
    karaokeRaw = raw;

    // Resolve new idx: look for current title, then walk back.
    let newIdx = -1;
    for (let i = anchorIdx; i >= 0; i--) {
      const title = priorTitles[i];
      const match = blocks.findIndex(b => b.title === title);
      if (match !== -1) { newIdx = match; break; }
    }
    if (newIdx === -1) newIdx = Math.min(idx, blocks.length - 1);
    if (newIdx < 0) newIdx = 0;
    idx = newIdx;

    renderMilestones();
    render();
  }

  function renderMilestones() {
    const wrap = document.getElementById("progress-wrap");
    wrap.querySelectorAll(".milestone-dot, .milestone-label").forEach(d => d.remove());
    milestonePcts.forEach(({ pct, title }, i) => {
      const dot = document.createElement("div");
      dot.className = "milestone-dot";
      dot.style.left = pct + "%";

      const label = document.createElement("div");
      label.className = "milestone-label " + (i % 2 === 0 ? "above" : "below");
      label.style.left = pct + "%";
      label.textContent = title;

      wrap.appendChild(label);
      wrap.appendChild(dot);
    });
  }

  function render() {
    const wordsEl = document.getElementById("words");
    const previewEl = document.getElementById("preview-words");
    const previewBox = document.getElementById("preview-box");
    const counter = document.getElementById("counter");
    const bar = document.getElementById("progress-bar");
    const restartBtn = document.getElementById("restart-btn");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");

    wordsEl.classList.add("fade");
    setTimeout(() => {
      const block = blocks[idx];
      wordsEl.innerHTML = buildBlockHtml(block);
      wordsEl.classList.remove("fade");
    }, 150);

    // Preview: render the next block (if any)
    const nextBlock = blocks[idx + 1];
    if (nextBlock) {
      previewEl.innerHTML = buildBlockHtml(nextBlock);
      previewBox.classList.remove("empty");
    } else {
      previewEl.innerHTML = "";
      previewBox.classList.add("empty");
    }

    const pct = blockPcts.length > 0 ? Math.round(blockPcts[idx]) : Math.round(((idx + 1) / blocks.length) * 100);
    bar.style.width = pct + "%";    counter.textContent = (idx + 1) + " / " + blocks.length;

    const atEnd = idx === blocks.length - 1;
    restartBtn.style.display = atEnd ? "block" : "none";
    if (prevBtn) prevBtn.disabled = idx === 0;
    if (nextBtn) nextBtn.disabled = atEnd;
  }

  function buildBlockHtml(block) {
    let html = `<div class="block-title">${escHtml(block.title)}</div>`;
    if (block.bullets.length > 0) {
      html += `<ul class="block-bullets">`;
      for (const b of block.bullets) {
        html += `<li><span class="bullet-num">${b.num}.</span><div>`;
        html += escHtml(b.text);
        if (b.subItems && b.subItems.length > 0) {
          html += `<ul class="sub-items">`;
          for (const s of b.subItems) {
            html += `<li>${escHtml(s)}</li>`;
          }
          html += `</ul>`;
        }
        html += `</div></li>`;
      }
      html += `</ul>`;
    }
    return html;
  }

  // ── Preview width control ──
  // Ratio = main flex / preview flex. Larger ratio = narrower preview.
  const PREVIEW_RATIO_MIN = 1.5;   // preview almost as wide as main
  const PREVIEW_RATIO_MAX = 8;     // preview very thin
  const PREVIEW_RATIO_STEP = 0.5;
  let previewRatio = 3;            // default: main is 3× preview (1/3)

  function applyPreviewRatio() {
    const wordBox = document.getElementById("word-box");
    const previewBox = document.getElementById("preview-box");
    if (!wordBox || !previewBox) return;
    wordBox.style.flex = previewRatio;
    previewBox.style.flex = 1;
    const minusBtn = document.getElementById("preview-minus");
    const plusBtn = document.getElementById("preview-plus");
    // "+" grows the preview → decreases ratio; "−" shrinks preview → increases ratio
    if (plusBtn) plusBtn.disabled = previewRatio <= PREVIEW_RATIO_MIN + 1e-9;
    if (minusBtn) minusBtn.disabled = previewRatio >= PREVIEW_RATIO_MAX - 1e-9;
  }

  function adjustPreview(dir) {
    // dir = +1 means grow preview, -1 means shrink preview
    previewRatio = Math.min(
      PREVIEW_RATIO_MAX,
      Math.max(PREVIEW_RATIO_MIN, previewRatio - dir * PREVIEW_RATIO_STEP)
    );
    applyPreviewRatio();
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function go(dir) {
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= blocks.length) return;
    idx = newIdx;
    render();
  }

  function restart() {
    idx = 0;
    render();
  }

  document.addEventListener("keydown", (e) => {
    if (blocks.length === 0) return;
    if (e.key === "ArrowRight") { e.preventDefault(); go(1); }
    if (e.key === "ArrowLeft")  { e.preventDefault(); go(-1); }
    if (e.key === "ArrowDown")  { e.preventDefault(); rotateBullets(1); }
    if (e.key === "ArrowUp")    { e.preventDefault(); rotateBullets(-1); }
  });

  function rotateBullets(dir) {
    const block = blocks[idx];
    if (!block || block.bullets.length < 2) return;
    if (dir === 1) {
      // rotate down: first goes to last → 1,2,3,4 becomes 2,3,4,1
      block.bullets.push(block.bullets.shift());
    } else {
      // rotate up: last comes to first → 1,2,3,4 becomes 4,1,2,3
      block.bullets.unshift(block.bullets.pop());
    }
    render();
  }
</script>
</body>
</html>
